{% extends 'userbase.html' %}

{% block title %}Submit Feedback - EcoCleanUp{% endblock %}

{% set active_page = 'home' %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Submit Feedback</h4>
                </div>
                <div class="card-body">
                    <h5 class="mb-3">{{ event.event_name }}</h5>
                    <p class="text-muted">{{ event.event_date.strftime('%B %d, %Y') }}</p>

                    <form method="POST" action="{{ url_for('submit_feedback', event_id=event_id) }}">
                        <div class="mb-4">
                            <label class="form-label">Rating</label>
                            <div class="rating">
                                {% for i in range(5, 0, -1) %}
                                <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" required>
                                <label for="star{{ i }}">
                                    <i class="bi bi-star-fill"></i>
                                </label>
                                {% endfor %}
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="comments" class="form-label">Comments</label>
                            <textarea class="form-control" id="comments" name="comments" rows="4"
                                placeholder="Share your experience..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Submit Feedback</button>
                            <a href="{{ url_for('participation_history') }}"
                                class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .rating {
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
    }

    .rating input {
        display: none;
    }

    .rating label {
        font-size: 1.8rem;
        color: #ccc;
        cursor: pointer;
        margin-right: 4px;
    }

    /* hover effect */
    .rating label:hover,
    .rating label:hover ~ label {
        color: #ffc107;
    }

    /* selected stars */
    .rating input:checked ~ label {
        color: #ffc107;
    }
</style>
{% endblock %}
